services:
  metabase:
    image: metabase/metabase:v0.56.2
    container_name: student-analytics-metabase
    restart: unless-stopped
    ports:
      - "${METABASE_PORT:-3001}:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_SITE_URL: "${METABASE_SITE_URL:-http://localhost:3001}"
      JAVA_TIMEZONE: "${METABASE_TIMEZONE:-Asia/Calcutta}"
    volumes:
      - ./data:/metabase-data
